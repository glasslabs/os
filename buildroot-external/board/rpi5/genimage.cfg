image boot.vfat {
    vfat {
        label = "glass-boot"
    }
    size = 256M
}

image rootfs-b.ext4 {
    ext4 {
        label = "glassos-system1"
    }
    size = 1536M
}

image data.ext4 {
    ext4 {
        label = "glassos-data"
    }
    size = 512M
}

image sdcard.img {
    hdimage {
        partition-table-type = "gpt"
        align = 1M
    }

    partition glassos-boot {
        partition-type-uuid = "esp"
        partition-uuid = "6bab75f7-5a19-4989-9e41-4e7a86ccd033"
        bootable = "true"
        image = "boot.vfat"
    }

    partition glassos-system0 {
        partition-type-uuid = "linux"
        partition-uuid = "c4e24ce5-46b8-4e6a-b92e-dad11027e96e"
        image = "rootfs.ext4"
        size = 1536M
    }

    partition glassos-system1 {
        partition-type-uuid = "linux"
        partition-uuid = "f1b79b43-2e2d-4dd6-a3fa-60e9f1b40a43"
        image = "rootfs-b.ext4"
    }

    partition glassos-bootstate {
        partition-type-uuid = "linux"
        partition-uuid = "7d26b5da-8bdb-42f6-9d52-dc54c0b7b43a"
        size = 8M
    }

    partition glassos-data {
        partition-type-uuid = "linux"
        partition-uuid = "e2b8f3a4-9c17-4e5d-b1f6-8c3d7a291e5b"
        image = "data.ext4"
    }
}
