image boot.vfat {
    vfat {
        files = {
            "bcm2712-rpi-5-b.dtb",
            "overlays/vc4-kms-v3d-pi5.dtbo",
            "fixup_cd.dat",
            "start_cd.elf",
            "u-boot.bin",
            "kernel_2712.img",
        }
        label = "glassos-boot"
    }
    size = 256M
}

image rootfs.ext4 {
    ext4 {
        label = "glassos-system0"
    }
    size = 1536M
}

image rootfs-b.ext4 {
    ext4 {
        label = "glassos-system1"
    }
    size = 1536M
}

image data.ext4 {
    ext4 {
        label = "glassos-data"
    }
    size = 512M
}

image sdcard.img {
    hdimage {}

    partition boot {
        partition-type = 0xC
        bootable = "true"
        image = "boot.vfat"
    }

    partition glassos-system0 {
        partition-type = 0x83
        image = "rootfs.ext4"
    }

    partition glassos-system1 {
        partition-type = 0x83
        image = "rootfs-b.ext4"
    }

    partition glassos-data {
        partition-type = 0x83
        image = "data.ext4"
    }
}

