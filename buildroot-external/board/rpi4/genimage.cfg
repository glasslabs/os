image boot.vfat {
    vfat {
        label = "glass-boot"
    }
    size = 256M
}

image rootfs-b.ext4 {
    ext4 {
        label = "glassos-system1"
    }
    size = 1536M
}

image data.ext4 {
    ext4 {
        label = "glassos-data"
    }
    size = 512M
}

image sdcard.img {
    hdimage {
        partition-table-type = "hybrid"
        align = 1M
    }

    partition glassos-boot {
        partition-type = 0xC
        partition-type-uuid = "esp"
        partition-uuid = "5a7a1f58-d836-4e23-ad3e-d4c5c1b7a32f"
        bootable = "true"
        image = "boot.vfat"
    }

    partition glassos-system0 {
        partition-type-uuid = "linux"
        partition-uuid = "8d3d53e3-6d49-4c38-8349-aff6859e82fd"
        image = "rootfs.ext4"
        size = 1536M
    }

    partition glassos-system1 {
        partition-type-uuid = "linux"
        partition-uuid = "a3ec664e-32ce-4665-95ea-7ae90ce9aa20"
        image = "rootfs-b.ext4"
    }

    partition glassos-bootstate {
        partition-type-uuid = "linux"
        partition-uuid = "33236519-7f32-4dff-8002-3390b62c309d"
        size = 8M
    }

    partition glassos-data {
        partition-type-uuid = "linux"
        partition-uuid = "a52a4597-fa3a-4851-aefd-2fbe9f849079"
        image = "data.ext4"
    }
}
