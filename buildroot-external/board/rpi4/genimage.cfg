image boot.vfat {
    vfat {
        files = {
            "bcm2711-rpi-4-b.dtb",
            "bcm2711-rpi-cm4.dtb",
            "overlays/vc4-kms-v3d.dtbo",
            "fixup4.dat",
            "start4.elf",
            "u-boot.bin",
            "kernel8.img",
        }
        label = "boot"
    }
    size = 256M
}

image rootfs.ext4 {
    ext4 {
        label = "rootfs-a"
    }
    size = 1536M
}

image rootfs-b.ext4 {
    ext4 {
        label = "rootfs-b"
    }
    size = 1536M
}

image data.ext4 {
    ext4 {
        label = "data"
    }
    size = 512M
}

image sdcard.img {
    hdimage {}

    partition boot {
        partition-type = 0xC
        bootable = "true"
        image = "boot.vfat"
    }

    partition rootfs-a {
        partition-type = 0x83
        image = "rootfs.ext4"
    }

    partition rootfs-b {
        partition-type = 0x83
        image = "rootfs-b.ext4"
    }

    partition data {
        partition-type = 0x83
        image = "data.ext4"
    }
}

