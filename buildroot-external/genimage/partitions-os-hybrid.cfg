# Partition order for hybrid MBR+GPT (Raspberry Pi 4).
#
# The RPi 4 boot ROM reads the MBR to find the FAT boot partition; it does not
# need to see any other partitions in the MBR.  U-Boot is compiled with
# CONFIG_DOS_PARTITION=n so it reads GPT exclusively — `part start` and `load`
# therefore work correctly for all GPT partition numbers, including bootstate
# at slot 6.
#
# Only the boot partition (included via partition-boot-hybrid.cfg) carries an
# MBR partition-type byte (0xC).  All other partitions below are GPT-only,
# keeping the hybrid MBR slot count within genimage's limit of 3.
#
# Slot order (matches GPT):
#   1 – boot       (VFAT)    – included by partition-boot-hybrid.cfg
#   2 – kernel0    (squashfs) – slot A kernel
#   3 – system0    (erofs)    – slot A rootfs
#   4 – kernel1    (squashfs) – slot B kernel
#   5 – system1    (erofs)    – slot B rootfs
#   6 – bootstate  (raw)      – U-Boot A/B env block
#   7 – overlay    (ext4)     – writable overlay
#   8 – data       (ext4)     – persistent data

partition glassos-kernel0 {
    partition-type-uuid = "linux"
    partition-uuid = "26700fc6-b0bc-4ccf-9837-ea1a4cba3e65"
    image = "kernel.img"
    size = ${KERNEL_SIZE}
}

partition glassos-system0 {
    partition-type-uuid = "linux"
    partition-uuid = "8d3d53e3-6d49-4c38-8349-aff6859e82fd"
    image = "rootfs.erofs"
    size = ${SYSTEM_SIZE}
}

partition glassos-kernel1 {
    partition-type-uuid = "linux"
    partition-uuid = "fc02a4f0-5350-406f-93a2-56cbed636b5f"
    size = ${KERNEL_SIZE}
}

partition glassos-system1 {
    partition-type-uuid = "linux"
    partition-uuid = "a3ec664e-32ce-4665-95ea-7ae90ce9aa20"
    size = ${SYSTEM_SIZE}
}

partition glassos-bootstate {
    partition-type-uuid = "linux"
    partition-uuid = "33236519-7f32-4dff-8002-3390b62c309d"
    size = ${BOOTSTATE_SIZE}
}

partition glassos-overlay {
    partition-type-uuid = "linux"
    partition-uuid = "f1326040-5236-40eb-b683-aaa100a9afcf"
    image = "overlay.ext4"
    size = ${OVERLAY_SIZE}
}

partition glassos-data {
    partition-type-uuid = "linux"
    partition-uuid = "a52a4597-fa3a-4851-aefd-2fbe9f849079"
    image = "data.ext4"
    size = ${DATA_SIZE}
}
