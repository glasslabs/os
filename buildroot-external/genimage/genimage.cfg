# GlassOS disk image layout.
#
# Variables sourced from each board's meta file and exported by post-image.sh:
#   PARTITION_TABLE_TYPE  hybrid | gpt
#   BOOT_SIZE             e.g. 32M (rpi4) or 64M (rpi5)
#   KERNEL_SIZE           24M
#   SYSTEM_SIZE           256M
#   BOOTSTATE_SIZE        8M
#   OVERLAY_SIZE          96M
#   DATA_SIZE             1280M
#   KERNEL_FILE           Image
#   BINARIES_DIR          set by Buildroot

# ── Intermediate images ───────────────────────────────────────────────────────

image boot.vfat {
    vfat {
        label = "glass-boot"
    }
    size = ${BOOT_SIZE}
}

# Kernel squashfs — wraps the uncompressed kernel Image with LZO compression.
# U-Boot reads Image from this squashfs partition directly.
image kernel.img {
    squashfs {
        compression = "lzo"
        block-size = 131072
    }
    size = ${KERNEL_SIZE}
    srcpath = "${BINARIES_DIR}/${KERNEL_FILE}"
}

image overlay.ext4 {
    ext4 {
        use-mke2fs = "yes"
        label = "glassos-overlay"
        extraargs = "-I 256 -E lazy_itable_init=0,lazy_journal_init=0"
    }
    size = ${OVERLAY_SIZE}
    empty = "yes"
}

image data.ext4 {
    ext4 {
        label = "glassos-data"
    }
    size = ${DATA_SIZE}
    empty = "yes"
}

# ── OTA bundle ───────────────────────────────────────────────────────────────

image "${GLASSOS_IMAGE_BASENAME}.raucb" {
    include("image-raucb.cfg")
}

# ── Full disk image ───────────────────────────────────────────────────────────

image sdcard.img {
    include("hdimage-${PARTITION_TABLE_TYPE}.cfg")

    include("partition-boot-${PARTITION_TABLE_TYPE}.cfg")

    include("partitions-os-${PARTITION_TABLE_TYPE}.cfg")
}
