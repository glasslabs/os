# Disable firmware-offloaded scan features (GSCAN bit 19, PNO bit 21) and
# TDLS (bit 13) that cause a 60-130 s initialisation delay on brcmfmac,
# which prevents NetworkManager from completing WiFi association on first boot.
# roamoff=1 prevents unsolicited firmware roam events from disrupting NM.
options brcmfmac roamoff=1 feature_disable=0x282000

