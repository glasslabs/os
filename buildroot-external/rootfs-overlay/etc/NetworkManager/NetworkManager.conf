[main]
dns=default
plugins=keyfile
autoconnect-retries-default=0
rc-manager=file

[keyfile]
# Store connections on the writable data partition — rootfs is read-only.
path=/data/NetworkManager/system-connections
unmanaged-devices=type:bridge;type:tun;driver:veth

[logging]
backend=journal
level=WARN

[connection]
connection.mdns=2
wifi.powersave=2

[device]
wifi.scan-rand-mac-address=no
