# Run dnsmasq as root so it does not attempt to drop privileges and chown
# the PID file, which fails on this system (Operation not permitted).
# NetworkManager manages the dnsmasq process lifetime directly, so running
# as root is safe for this embedded use-case.
user=root

# Do not read /etc/resolv.conf for upstream servers — it is empty during the
# setup AP phase. This is a provisioning-only AP with no internet routing, so
# advertise no DNS servers to DHCP clients to avoid resolution timeouts.
no-resolv
dhcp-option=option:dns-server

