name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        board: [rpi4, rpi5]

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-agent-${{ hashFiles('agent/go.sum') }}
          restore-keys: ${{ runner.os }}-gomod-agent-

      - name: Install Buildroot host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake bash bc binutils bison build-essential bzip2 cpio file \
            flex genext2fs genimage gettext git help2man libncurses-dev libssl-dev \
            make patch perl python3 python3-setuptools rsync texinfo unzip wget xz-utils

      - name: Cache Buildroot downloads
        uses: actions/cache@v5
        with:
          path: |
            buildroot/dl
            buildroot/output/${{ matrix.board }}/host
          key: buildroot-${{ matrix.board }}-${{ hashFiles(format('buildroot-external/configs/glassos_{0}_defconfig', matrix.board)) }}
          restore-keys: buildroot-${{ matrix.board }}-

      - name: Write RAUC signing key
        env:
          RAUC_SIGNING_KEY: ${{ secrets.RAUC_SIGNING_KEY }}
        run: |
          if [ -n "${RAUC_SIGNING_KEY}" ]; then
            echo "${RAUC_SIGNING_KEY}" > /tmp/rauc-signing.key.pem
            echo "GLASSOS_RAUC_KEY=/tmp/rauc-signing.key.pem" >> "$GITHUB_ENV"
          fi

      - name: Build image and RAUC bundle
        run: |
          make build-${{ matrix.board }} GLASSOS_VERSION=${{ github.ref_name }}

      - name: Rename release artefacts
        run: |
          VERSION="${{ github.ref_name }}"
          BOARD="${{ matrix.board }}"
          IMAGES="buildroot/output/${BOARD}/images"

          cp "${IMAGES}/sdcard.img.xz" \
             "glassos-${BOARD}-${VERSION}.img.xz"

          cp "${IMAGES}/glassos-${BOARD}-${VERSION}.raucb" \
             "glassos-${BOARD}-${VERSION}.raucb"

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/rauc-signing.key.pem

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            glassos-${{ matrix.board }}-${{ github.ref_name }}.img.xz
            glassos-${{ matrix.board }}-${{ github.ref_name }}.raucb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
