on:
  push:
    branches:
      - main
  pull_request:

name: agent

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GOLANGCI_LINT_VERSION: v2.11.4

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-agent-${{ hashFiles('agent/go.sum') }}
          restore-keys: ${{ runner.os }}-gomod-agent-

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: agent

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache: false

      - name: Cache Go modules
        id: mod-cache
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-agent-${{ hashFiles('agent/go.sum') }}
          restore-keys: ${{ runner.os }}-gomod-agent-

      - name: Download dependencies
        if: steps.mod-cache.outputs.cache-hit != 'true'
        run: cd agent && go mod download

      - name: Run tests
        run: make test-agent

  ci:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()

    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
