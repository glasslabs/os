name: build

on:
  workflow_dispatch:
    inputs:
      board:
        description: Board to build (leave blank for all)
        type: choice
        options: ['', rpi4, rpi5]
        required: false
      glass_version:
        description: "Glass binary version to embed (e.g. v2.0.0; leave blank to use Makefile default)"
        type: string
        required: false
      glass_variant:
        description: "Glass binary variant to embed"
        type: choice
        options: [wayland, x11, full]
        required: false
        default: wayland

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: matrix
        run: |
          if [ -n "${{ inputs.board }}" ]; then
            echo 'matrix=["${{ inputs.board }}"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["rpi4","rpi5"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    strategy:
      matrix:
        board: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-agent-${{ hashFiles('agent/go.sum') }}
          restore-keys: ${{ runner.os }}-gomod-agent-

      - name: Install Buildroot host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake bash bc binutils bison build-essential bzip2 cpio file \
            flex genext2fs genimage gettext git help2man libncurses-dev libssl-dev \
            make patch perl python3 python3-setuptools rsync texinfo unzip wget xz-utils

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: |
            buildroot/dl
            buildroot/output/${{ matrix.board }}/host
          key: buildroot-${{ matrix.board }}-${{ hashFiles(format('buildroot-external/configs/glassos_{0}_defconfig', matrix.board)) }}
          restore-keys: buildroot-${{ matrix.board }}-

      - name: Write RAUC signing key
        env:
          RAUC_SIGNING_KEY: ${{ secrets.RAUC_SIGNING_KEY }}
        run: |
          if [ -n "${RAUC_SIGNING_KEY}" ]; then
            echo "${RAUC_SIGNING_KEY}" > /tmp/rauc-signing.key.pem
            echo "GLASSOS_RAUC_KEY=/tmp/rauc-signing.key.pem" >> "$GITHUB_ENV"
          fi

      - name: Build image
        run: |
          make build-${{ matrix.board }} \
            ${GLASS_VERSION:+GLASS_VERSION="$GLASS_VERSION"} \
            GLASS_VARIANT="${GLASS_VARIANT}"
        env:
          GLASS_VERSION: ${{ inputs.glass_version }}
          GLASS_VARIANT: ${{ inputs.glass_variant || 'wayland' }}

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/rauc-signing.key.pem

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: glassos-${{ matrix.board }}
          path: |
            buildroot/output/${{ matrix.board }}/images/sdcard.img.xz
            buildroot/output/${{ matrix.board }}/images/*.raucb
          retention-days: 14
